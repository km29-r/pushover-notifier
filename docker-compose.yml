version: "3.8"

services:
  app:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./app.db:/app/app.db
    restart: unless-stopped
  notifier:
    build: .
    env_file: .env
    volumes:
      - ./app.db:/app/app.db
    # For demonstration only: run notifier every 25 minutes. In production
    # use cron or a proper scheduler instead of this loop.
    command: ["bash", "-c", "while true; do python notifier.py; sleep 1500; done"]
    restart: unless-stopped